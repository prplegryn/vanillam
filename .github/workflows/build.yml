name: Android Build

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Build signed Android artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Bootstrap Gradle wrapper
        run: |
          if [ ! -f android/gradlew ]; then
            flutter create --platforms=android --org com.prplegryn --project-name vanilla /tmp/vanilla_bootstrap
            cp /tmp/vanilla_bootstrap/android/gradlew android/gradlew
            cp -R /tmp/vanilla_bootstrap/android/gradle android/gradle
            chmod +x android/gradlew
          fi

      - name: Verify fixed signing files
        run: |
          test -f android/key.properties
          test -f android/keystore/vanilla-release.jks
          grep -q "storeFile=keystore/vanilla-release.jks" android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release app bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vanilla-android-release
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
